name: SV_EXECUTIVE_SUMMARY

description: >
  Executive sales summary semantic model for analysing revenue, transactions,
  member performance, stores, sales channels, sales types, dates and time periods.

tables:
  - name: AWS_FACT_STATS_SUMMARY
    description: >
      Aggregated sales fact table at transaction date, 30-minute time interval,
      store, sales channel and sales type grain.

    base_table:
      database: PORTFOLIO_DB
      schema: MARTS
      table: AWS_FACT_STATS_SUMMARY

    dimensions:
      - name: HOLIDAY_NAME
        description: Holiday associated with the transaction date, when applicable
        expr: HOLIDAY_NAME
        data_type: VARCHAR(16777216)

      - name: SALES_CHANNEL
        description: Sales channel identifier
        expr: SALES_CHANNEL
        data_type: NUMBER(38,0)

      - name: SALES_TYPE
        description: Sales type identifier
        expr: SALES_TYPE
        data_type: NUMBER(38,0)

      - name: STATE
        description: State in which the restaurant operates
        expr: STATE
        data_type: VARCHAR(16777216)

      - name: STORE_ID
        description: Restaurant identifier
        expr: STORE_ID
        data_type: NUMBER(38,0)

    time_dimensions:
      - name: TRANSACTION_DATE
        description: Business date of the transactions
        expr: TRANSACTION_DATE
        data_type: DATE

      - name: TRANSACTION_TIME_BINNED_30
        description: Transaction time grouped into a 30-minute interval
        expr: TRANSACTION_TIME_BINNED_30
        data_type: TIME(9)

    facts:
      - name: TRANSACTION_COUNT
        description: Number of distinct transactions represented by the row
        expr: TRANSACTION_COUNT
        data_type: NUMBER(18,0)
        access_modifier: public_access

      - name: TRANSACTION_COUNT_MEMBER
        description: Number of distinct transactions associated with a member
        expr: TRANSACTION_COUNT_MEMBER
        data_type: NUMBER(18,0)
        access_modifier: public_access

      - name: AMOUNT_GST
        description: Total GST amount
        expr: AMOUNT_GST
        data_type: NUMBER(29,7)
        access_modifier: public_access

      - name: AMOUNT_GST_MEMBER
        description: GST amount from member transactions
        expr: AMOUNT_GST_MEMBER
        data_type: NUMBER(29,7)
        access_modifier: public_access

      - name: AMOUNT_NET
        description: Net sales amount excluding GST
        expr: AMOUNT_NET
        data_type: NUMBER(38,7)
        access_modifier: public_access

      - name: AMOUNT_NET_MEMBER
        description: Net sales amount from member transactions excluding GST
        expr: AMOUNT_NET_MEMBER
        data_type: NUMBER(38,7)
        access_modifier: public_access

    metrics:
      - name: TOTAL_NET_SALES
        description: Total net sales excluding GST
        expr: SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET)

      - name: TOTAL_GST
        description: Total GST collected
        expr: SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_GST)

      - name: TOTAL_GROSS_SALES
        description: Total gross sales including GST
        expr: >
          SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET)
          + SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_GST)

      - name: TOTAL_TRANSACTIONS
        description: Total number of transactions
        expr: SUM(AWS_FACT_STATS_SUMMARY.TRANSACTION_COUNT)

      - name: MEMBER_TRANSACTIONS
        description: Total number of transactions associated with members
        expr: SUM(AWS_FACT_STATS_SUMMARY.TRANSACTION_COUNT_MEMBER)

      - name: NON_MEMBER_TRANSACTIONS
        description: Total number of transactions not associated with members
        expr: >
          SUM(AWS_FACT_STATS_SUMMARY.TRANSACTION_COUNT)
          - SUM(AWS_FACT_STATS_SUMMARY.TRANSACTION_COUNT_MEMBER)

      - name: MEMBER_NET_SALES
        description: Total net sales generated by members
        expr: SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET_MEMBER)

      - name: NON_MEMBER_NET_SALES
        description: Total net sales generated by non-members
        expr: >
          SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET)
          - SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET_MEMBER)

      - name: MEMBER_GST
        description: Total GST generated by member transactions
        expr: SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_GST_MEMBER)

      - name: MEMBER_GROSS_SALES
        description: Total gross sales generated by members
        expr: >
          SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET_MEMBER)
          + SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_GST_MEMBER)

      - name: NON_MEMBER_GROSS_SALES
        description: Total gross sales generated by non-members
        expr: >
          SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET)
          + SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_GST)
          - SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET_MEMBER)
          - SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_GST_MEMBER)

      - name: AVERAGE_NET_SALES_PER_TRANSACTION
        description: Average net sales value per transaction
        expr: >
          DIV0(
            SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET),
            SUM(AWS_FACT_STATS_SUMMARY.TRANSACTION_COUNT)
          )

      - name: AVERAGE_GROSS_SALES_PER_TRANSACTION
        description: Average gross sales value per transaction
        expr: >
          DIV0(
            SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET)
              + SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_GST),
            SUM(AWS_FACT_STATS_SUMMARY.TRANSACTION_COUNT)
          )

      - name: MEMBER_AVERAGE_NET_SALES_PER_TRANSACTION
        description: Average net sales value per member transaction
        expr: >
          DIV0(
            SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET_MEMBER),
            SUM(AWS_FACT_STATS_SUMMARY.TRANSACTION_COUNT_MEMBER)
          )

      - name: MEMBER_TRANSACTION_RATE
        description: Proportion of transactions associated with members
        expr: >
          DIV0(
            SUM(AWS_FACT_STATS_SUMMARY.TRANSACTION_COUNT_MEMBER),
            SUM(AWS_FACT_STATS_SUMMARY.TRANSACTION_COUNT)
          )

      - name: MEMBER_NET_SALES_RATE
        description: Proportion of net sales generated by members
        expr: >
          DIV0(
            SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET_MEMBER),
            SUM(AWS_FACT_STATS_SUMMARY.AMOUNT_NET)
          )

    primary_key:
      columns:
        - TRANSACTION_DATE
        - TRANSACTION_TIME_BINNED_30
        - STORE_ID
        - SALES_CHANNEL
        - SALES_TYPE

  - name: V_DIM_DATE
    description: Calendar dimension used for fiscal and weekly reporting

    base_table:
      database: PORTFOLIO_DB
      schema: MARTS
      table: V_DIM_DATE

    dimensions:
      - name: FY
        description: Fiscal year
        expr: FY
        data_type: NUMBER(4,0)

    time_dimensions:
      - name: DATE_KEY
        description: Calendar date
        expr: DATE_KEY
        data_type: DATE

      - name: WEEK_ENDING_SUNDAY
        description: Sunday ending the calendar week
        expr: WEEK_ENDING_SUNDAY
        data_type: DATE

    primary_key:
      columns:
        - DATE_KEY

  - name: V_DIM_RESTAURANTS
    description: Restaurant dimension containing store attributes and location

    base_table:
      database: PORTFOLIO_DB
      schema: MARTS
      table: V_DIM_RESTAURANTS

    dimensions:
      - name: OWNERSHIP_TYPE
        description: Restaurant ownership classification
        expr: OWNERSHIP_TYPE
        data_type: VARCHAR(16777216)

      - name: STATE
        description: State in which the restaurant operates
        expr: STATE
        data_type: VARCHAR(16777216)

      - name: STORE_ID
        description: Unique restaurant identifier
        expr: STORE_ID
        data_type: NUMBER(4,0)

      - name: STORE_NAME
        description: Restaurant name
        expr: STORE_NAME
        data_type: VARCHAR(16777216)

      - name: LATITUDE
        description: Restaurant latitude
        expr: LATITUDE
        data_type: NUMBER(5,3)

      - name: LONGITUDE
        description: Restaurant longitude
        expr: LONGITUDE
        data_type: NUMBER(6,3)

    primary_key:
      columns:
        - STORE_ID

  - name: V_DIM_SALES_CHANNEL
    description: Lookup dimension for sales channels

    base_table:
      database: PORTFOLIO_DB
      schema: MARTS
      table: V_DIM_SALES_CHANNEL

    dimensions:
      - name: SALES_CHANNEL_ID
        description: Unique sales channel identifier
        expr: SALES_CHANNEL_ID
        data_type: NUMBER(2,0)

      - name: SALES_CHANNEL_NAME
        description: Sales channel name
        expr: SALES_CHANNEL_NAME
        data_type: VARCHAR(16777216)

    primary_key:
      columns:
        - SALES_CHANNEL_ID

  - name: V_DIM_SALES_TYPE
    description: Lookup dimension for sales types

    base_table:
      database: PORTFOLIO_DB
      schema: MARTS
      table: V_DIM_SALES_TYPE

    dimensions:
      - name: SALES_TYPE_ID
        description: Unique sales type identifier
        expr: SALES_TYPE_ID
        data_type: NUMBER(3,0)

      - name: SALES_TYPE_NAME
        description: Sales type name
        expr: SALES_TYPE_NAME
        data_type: VARCHAR(16777216)

    primary_key:
      columns:
        - SALES_TYPE_ID

  - name: V_DIM_TIME
    description: Time-of-day dimension

    base_table:
      database: PORTFOLIO_DB
      schema: MARTS
      table: V_DIM_TIME

    dimensions:
      - name: TIME_PART_OF_THE_DAY
        description: Named part of day such as morning, afternoon or evening
        expr: TIME_PART_OF_THE_DAY
        data_type: VARCHAR(16777216)

    time_dimensions:
      - name: TIME_KEY
        description: Time key aligned to the fact table 30-minute interval
        expr: TIME_KEY
        data_type: TIME(9)

    primary_key:
      columns:
        - TIME_KEY

relationships:
  - name: FACT_STATS_TO_DATE
    left_table: AWS_FACT_STATS_SUMMARY
    right_table: V_DIM_DATE
    relationship_columns:
      - left_column: TRANSACTION_DATE
        right_column: DATE_KEY
    join_type: left_outer
    relationship_type: many_to_one

  - name: FACT_STATS_TO_RESTAURANT
    left_table: AWS_FACT_STATS_SUMMARY
    right_table: V_DIM_RESTAURANTS
    relationship_columns:
      - left_column: STORE_ID
        right_column: STORE_ID
    join_type: left_outer
    relationship_type: many_to_one

  - name: FACT_STATS_TO_SALES_CHANNEL
    left_table: AWS_FACT_STATS_SUMMARY
    right_table: V_DIM_SALES_CHANNEL
    relationship_columns:
      - left_column: SALES_CHANNEL
        right_column: SALES_CHANNEL_ID
    join_type: left_outer
    relationship_type: many_to_one

  - name: FACT_STATS_TO_SALES_TYPE
    left_table: AWS_FACT_STATS_SUMMARY
    right_table: V_DIM_SALES_TYPE
    relationship_columns:
      - left_column: SALES_TYPE
        right_column: SALES_TYPE_ID
    join_type: left_outer
    relationship_type: many_to_one

  - name: FACT_STATS_TO_TIME
    left_table: AWS_FACT_STATS_SUMMARY
    right_table: V_DIM_TIME
    relationship_columns:
      - left_column: TRANSACTION_TIME_BINNED_30
        right_column: TIME_KEY
    join_type: left_outer
    relationship_type: many_to_one