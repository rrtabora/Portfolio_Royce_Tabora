  - name: PRODUCT_MODIFIER_TO_SALES_CHANNEL
    left_table: AWS_FACT_PRODUCT_MODIFIER
    right_table: V_DIM_SALES_CHANNEL
    relationship_columns:
      - left_column: SALES_CHANNEL
        right_column: SALES_CHANNEL_ID

  - name: PRODUCT_INSTANCE_TO_SALES_TYPE
    left_table: AWS_FACT_PRODUCT_INSTANCE
    right_table: V_DIM_SALES_TYPE
    relationship_columns:
      - left_column: SALES_TYPE
        right_column: SALES_TYPE_ID

  - name: PRODUCT_MODIFIER_TO_SALES_TYPE
    left_table: AWS_FACT_PRODUCT_MODIFIER
    right_table: V_DIM_SALES_TYPE
    relationship_columns:
      - left_column: SALES_TYPE
        right_column: SALES_TYPE_ID

module_custom_instructions:
  sql_generation: |
    PRODUCT QUERY ROUTING RULES:
    1. When a user asks about a named item, product, menu item, sales, revenue,
       quantity, units sold, transactions, customers, stores, channels, or dates,
       start with V_DIM_PRODUCT_CODE as the parent product dimension and
       AWS_FACT_PRODUCT_INSTANCE as the authoritative fact table.
    2. Resolve the requested parent item using V_DIM_PRODUCT_CODE.PLU_NAME or PLU_CODE,
       then join it to AWS_FACT_PRODUCT_INSTANCE through PLU_CODE_PARENT.
    3. Never use AWS_FACT_PRODUCT_MODIFIER to calculate parent-item sales or parent-item
       quantity because one parent instance can have multiple modifier rows and this can
       duplicate parent measures.
    4. Only use AWS_FACT_PRODUCT_MODIFIER and V_DIM_PRODUCT_CODE_CHILD when the user asks
       for details about an item, including ingredients, additions, removals,
       substitutions, cheeses removed, sauces added, or other customisations.
    5. For item-detail questions, preserve the parent-child path:
       V_DIM_PRODUCT_CODE -> AWS_FACT_PRODUCT_INSTANCE -> AWS_FACT_PRODUCT_MODIFIER
       -> V_DIM_PRODUCT_CODE_CHILD.
    6. Connect modifier rows to their sold parent item using both INSTANCE_ID and
       PLU_CODE_PARENT. Resolve the modifier through PLU_CODE_CHILD.
    7. For questions such as "how many [parent item] had [child detail] removed",
       filter the parent name in V_DIM_PRODUCT_CODE, filter the child detail name in
       V_DIM_PRODUCT_CODE_CHILD, and count distinct AWS_FACT_PRODUCT_MODIFIER.INSTANCE_ID.
       Use MODIFIER_QUANTITY only when the user explicitly asks for the quantity of the
       modifier itself. Do not assume the sign of MODIFIER_QUANTITY means removal unless
       the source data or child PLU naming confirms that rule.
    8. When joining the instance fact to the modifier fact, aggregate parent metrics
       before the one-to-many modifier join or use distinct parent INSTANCE_ID counts.
    9. Use TOTAL_PARENT_ITEM_QUANTITY for units sold, SOLD_ITEM_INSTANCE_COUNT for
       distinct sold item instances, and TRANSACTION_COUNT for distinct orders.
    10. Use net sales by default when the user asks for sales or revenue without
        specifying gross or net. Clearly label the measure used.

  question_categorization: |
    Classify questions naming a menu item as parent-product questions by default.
    Classify questions mentioning additions, removals, ingredients, modifiers,
    customisations, "with", "without", "extra", or "removed" as item-detail questions
    that require the child PLU path while retaining the parent item context.