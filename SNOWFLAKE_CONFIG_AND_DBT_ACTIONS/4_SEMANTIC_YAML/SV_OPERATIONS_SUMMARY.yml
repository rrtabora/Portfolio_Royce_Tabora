  - name: SHIFT_COUNT
    description: Count of distinct shifts.
    expr: COUNT(DISTINCT SHIFT_ID)
    access_modifier: public_access
  - name: EMPLOYEE_COUNT
    description: Count of distinct employees with shifts.
    expr: COUNT(DISTINCT EMPLOYEE_ID)
    access_modifier: public_access
