    expr: CALCULATED_SCHEDULED_HOURS
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: CALCULATED_ACTUAL_HOURS
    description: Actual hours aggregated from shift records.
    expr: CALCULATED_ACTUAL_HOURS
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: CALCULATED_REGULAR_HOURS
    description: Regular hours aggregated from shift records.
    expr: CALCULATED_REGULAR_HOURS
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: CALCULATED_OVERTIME_HOURS
    description: Overtime hours aggregated from shift records.
    expr: CALCULATED_OVERTIME_HOURS
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: CALCULATED_LABOUR_COST
    description: Labour cost aggregated from shift records.
    expr: CALCULATED_LABOUR_COST
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: CALCULATED_ABSENCE_COUNT
    description: Number of absent shift records.
    expr: CALCULATED_ABSENCE_COUNT
    data_type: NUMBER(38,0)
    access_modifier: public_access
  - name: NO_SHOW_COUNT
    description: Number of no-show shift records.
    expr: NO_SHOW_COUNT
    data_type: NUMBER(38,0)
    access_modifier: public_access
  - name: SOURCE_ESTIMATED_SALES
    description: Synthetic estimated sales supplied in the source labour table.
    expr: SOURCE_ESTIMATED_SALES
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: SCHEDULE_VARIANCE_HOURS
    description: Actual hours less scheduled hours.
    expr: SCHEDULE_VARIANCE_HOURS
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: OVERTIME_RATE
    description: Overtime hours divided by actual hours.
    expr: OVERTIME_RATE
    data_type: NUMBER(38,8)
    access_modifier: public_access
  - name: ABSENCE_RATE
    description: Absence count divided by scheduled employees.
    expr: ABSENCE_RATE
    data_type: NUMBER(38,8)
    access_modifier: public_access
  - name: NO_SHOW_RATE
    description: No-show count divided by scheduled employees.
    expr: NO_SHOW_RATE
    data_type: NUMBER(38,8)
    access_modifier: public_access
  - name: ESTIMATED_SALES_PER_LABOUR_HOUR
    description: Estimated sales divided by actual hours.
    expr: ESTIMATED_SALES_PER_LABOUR_HOUR
    data_type: NUMBER(38,8)
    access_modifier: public_access
  - name: ESTIMATED_LABOUR_COST_RATE
    description: Labour cost divided by estimated sales.
    expr: ESTIMATED_LABOUR_COST_RATE
    data_type: NUMBER(38,8)
    access_modifier: public_access
  metrics:
  - name: TOTAL_DAILY_LABOUR_COST
    description: Total calculated labour cost.
    expr: SUM(CALCULATED_LABOUR_COST)
    access_modifier: public_access
  - name: TOTAL_DAILY_ACTUAL_HOURS
    description: Total calculated actual hours.
    expr: SUM(CALCULATED_ACTUAL_HOURS)
    access_modifier: public_access
  - name: TOTAL_DAILY_OVERTIME_HOURS
    description: Total calculated overtime hours.
    expr: SUM(CALCULATED_OVERTIME_HOURS)
    access_modifier: public_access
  - name: TOTAL_ESTIMATED_SALES
    description: Total synthetic estimated sales.
    expr: SUM(SOURCE_ESTIMATED_SALES)
    access_modifier: public_access
  - name: AGGREGATE_ESTIMATED_SALES_PER_LABOUR_HOUR
    description: Estimated sales per actual labour hour.
    expr: SUM(SOURCE_ESTIMATED_SALES) / NULLIF(SUM(CALCULATED_ACTUAL_HOURS), 0)
    access_modifier: public_access
  - name: AGGREGATE_ESTIMATED_LABOUR_COST_RATE
    description: Labour cost as a proportion of estimated sales.
    expr: SUM(CALCULATED_LABOUR_COST) / NULLIF(SUM(SOURCE_ESTIMATED_SALES), 0)
    access_modifier: public_access
  - name: AGGREGATE_OVERTIME_RATE
    description: Overtime hours as a proportion of actual hours.
    expr: SUM(CALCULATED_OVERTIME_HOURS) / NULLIF(SUM(CALCULATED_ACTUAL_HOURS), 0)
    access_modifier: public_access
  primary_key:
    columns:
    - LABOUR_PERFORMANCE_KEY
