    access_modifier: public_access
  - name: TOTAL_ACTUAL_HOURS
    description: Total actual hours.
    expr: SUM(ACTUAL_HOURS)
    access_modifier: public_access
  - name: TOTAL_OVERTIME_HOURS
    description: Total overtime hours.
    expr: SUM(OVERTIME_HOURS)
    access_modifier: public_access
  - name: TOTAL_SHIFT_LABOUR_COST
    description: Total shift labour cost.
    expr: SUM(LABOUR_COST)
    access_modifier: public_access
  - name: ABSENCE_SHIFT_COUNT
    description: Number of shifts marked absent.
    expr: COUNT_IF(ABSENCE_FLAG)
    access_modifier: public_access
  - name: NO_SHOW_SHIFT_COUNT
    description: Number of shifts marked as no-show.
    expr: COUNT_IF(NO_SHOW_FLAG)
    access_modifier: public_access
  - name: OVERTIME_SHIFT_COUNT
    description: Number of shifts containing overtime.
    expr: COUNT_IF(OVERTIME_FLAG)
    access_modifier: public_access
  - name: AGGREGATE_SCHEDULE_ADHERENCE_RATE
    description: Total actual coverage relative to total scheduled hours.
    expr: SUM(LEAST(ACTUAL_HOURS, SCHEDULED_HOURS)) / NULLIF(SUM(SCHEDULED_HOURS), 0)
    access_modifier: public_access
  primary_key:
    columns:
    - SHIFT_PERFORMANCE_KEY
- name: OPS_FACT_RESTAURANT_LABOUR_PERFORMANCE
  base_table:
    database: PORTFOLIO_DB
    schema: MARTS
    table: OPS_FACT_RESTAURANT_LABOUR_PERFORMANCE
  dimensions:
  - name: LABOUR_PERFORMANCE_KEY
    description: Unique key for restaurant and work date.
