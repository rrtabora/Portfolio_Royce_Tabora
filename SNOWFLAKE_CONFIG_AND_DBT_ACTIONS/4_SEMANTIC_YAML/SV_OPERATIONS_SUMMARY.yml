- name: OPS_FACT_EMPLOYEE_SHIFT_PERFORMANCE
  base_table:
    database: PORTFOLIO_DB
    schema: MARTS
    table: OPS_FACT_EMPLOYEE_SHIFT_PERFORMANCE
  dimensions:
  - name: SHIFT_PERFORMANCE_KEY
    description: Unique shift performance key.
