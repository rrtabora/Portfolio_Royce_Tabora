    data_type: VARCHAR(16777216)
  - name: SHIFT_ID
    description: Unique shift identifier.
    expr: SHIFT_ID
    data_type: VARCHAR(16777216)
  - name: RESTAURANT_ID
    description: Restaurant where the shift was scheduled.
    expr: RESTAURANT_ID
    data_type: NUMBER(38,0)
  - name: EMPLOYEE_ID
    description: Employee assigned to the shift.
    expr: EMPLOYEE_ID
    data_type: VARCHAR(16777216)
  - name: JOB_ROLE
    description: Job role worked during the shift.
    expr: JOB_ROLE
    data_type: VARCHAR(16777216)
  - name: ABSENCE_FLAG
    description: True when the shift was recorded as an absence.
    expr: ABSENCE_FLAG
    data_type: BOOLEAN
  - name: NO_SHOW_FLAG
    description: True when the employee did not attend the shift.
    expr: NO_SHOW_FLAG
    data_type: BOOLEAN
  - name: OVERTIME_FLAG
    description: True when overtime hours were recorded.
    expr: OVERTIME_FLAG
    data_type: BOOLEAN
  - name: ATTENDANCE_STATUS
    description: Derived attendance category for the shift.
    expr: ATTENDANCE_STATUS
    data_type: VARCHAR(16777216)
  time_dimensions:
  - name: SHIFT_DATE
    description: Date of the employee shift.
    expr: SHIFT_DATE
    data_type: DATE
  - name: SCHEDULED_START_TIME
    description: Scheduled shift start time.
    expr: SCHEDULED_START_TIME
    data_type: TIME(9)
  - name: SCHEDULED_END_TIME
    description: Scheduled shift end time.
    expr: SCHEDULED_END_TIME
    data_type: TIME(9)
  facts:
  - name: SCHEDULED_HOURS
    description: Hours scheduled for the shift.
    expr: SCHEDULED_HOURS
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: ACTUAL_HOURS
    description: Hours actually worked.
    expr: ACTUAL_HOURS
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: REGULAR_HOURS
    description: Regular hours worked.
    expr: REGULAR_HOURS
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: OVERTIME_HOURS
    description: Overtime hours worked.
    expr: OVERTIME_HOURS
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: HOURLY_RATE
    description: Hourly pay rate applied to the shift.
    expr: HOURLY_RATE
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: LABOUR_COST
    description: Labour cost recorded for the shift.
    expr: LABOUR_COST
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: HOURS_VARIANCE
    description: Actual hours less scheduled hours.
    expr: HOURS_VARIANCE
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: ABSOLUTE_HOURS_VARIANCE
    description: Absolute difference between actual and scheduled hours.
    expr: ABSOLUTE_HOURS_VARIANCE
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: SCHEDULE_ADHERENCE_RATE
    description: Actual scheduled-hour coverage capped at the scheduled hours.
    expr: SCHEDULE_ADHERENCE_RATE
    data_type: NUMBER(38,8)
    access_modifier: public_access
  - name: CALCULATED_REGULAR_LABOUR_COST
    description: Regular hours multiplied by hourly rate.
    expr: CALCULATED_REGULAR_LABOUR_COST
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: CALCULATED_OVERTIME_LABOUR_COST
    description: Overtime hours multiplied by hourly rate and overtime multiplier.
    expr: CALCULATED_OVERTIME_LABOUR_COST
    data_type: NUMBER(38,6)
    access_modifier: public_access
  - name: LABOUR_COST_VARIANCE
    description: Source labour cost less calculated regular and overtime cost.
    expr: LABOUR_COST_VARIANCE
    data_type: NUMBER(38,6)
    access_modifier: public_access
